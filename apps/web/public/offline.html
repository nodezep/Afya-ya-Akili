<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — AKILI</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #f1f5f9; }
      }
      .card { text-align: center; padding: 2rem; max-width: 26rem; }
      .logo {
        width: 64px; height: 64px; border-radius: 14px; background: #0f766e;
        display: inline-flex; align-items: center; justify-content: center;
        color: #fff; font-size: 1.6rem; font-weight: 700; margin-bottom: 1rem;
      }
      h1 { font-size: 1.3rem; margin: 0 0 .5rem; }
      p { color: #64748b; line-height: 1.5; }
      button {
        margin-top: 1rem; background: #0f766e; color: #fff; border: 0;
        padding: .7rem 1.4rem; border-radius: .6rem; font-size: 1rem; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">A</div>
      <h1>You're offline</h1>
      <p>
        AKILI needs a connection for chat and syncing, but your breathing
        still works offline: in for 4, hold for 4, out for 6. We'll be here
        when you're back.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>

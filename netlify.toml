[build]
  base = "apps/web"  # Change this to your web app directory
  command = "npm install --legacy-peer-deps && npm run build --workspace apps/web"
  publish = "apps/web/dist"  # Update this path

[build.environment]
  NODE_VERSION = "20"

# Redirect all routes to index.html for React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200